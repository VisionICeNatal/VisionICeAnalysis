name: Deploy Docs

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

# Cancel any superseded run of the same workflow + ref so a fast
# follow-up commit doesn't queue up behind the now-stale previous run.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    # Fork-PR token guard: same rationale as tests.yml — keep the
    # UPSTREAM_REPO_TOKEN PAT off fork PRs. ``on: push`` already
    # bounds this workflow to main, but the guard documents the policy
    # alongside tests.yml so the two stay in sync.
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: 'pip'
          cache-dependency-path: pyproject.toml
      # See tests.yml for the rationale on UPSTREAM_REPO_TOKEN; same
      # private-repo problem applies here.
      - name: Configure git for private upstream cloning
        env:
          UPSTREAM_REPO_TOKEN: ${{ secrets.UPSTREAM_REPO_TOKEN }}
        run: |
          git config --global \
            url."https://x-access-token:${UPSTREAM_REPO_TOKEN}@github.com/".insteadOf \
            "https://github.com/"
      # Sibling packages pinned to specific commit SHAs (see tests.yml
      # for rationale). Keep these SHAs in sync with tests.yml.
      - run: pip install "visioniceio @ git+https://github.com/VisionICeNatal/VisionICeIO.git@63bb74ac1fd473bbd2e9750eb8d4f70964af7538"
      - run: pip install "neural-cca @ git+https://github.com/goecidbn/neural_cca.git@bc8eccbf5a69c783215dc125ea43739782ac4302"
      - run: pip install -e ".[docs]"
      - run: sphinx-build -b html docs docs/_build/html
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs/_build/html
      - id: deployment
        uses: actions/deploy-pages@v4
