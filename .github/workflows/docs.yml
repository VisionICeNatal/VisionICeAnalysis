name: Deploy Docs

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      # See tests.yml for the rationale on UPSTREAM_REPO_TOKEN; same
      # private-repo problem applies here.
      - name: Configure git for private upstream cloning
        env:
          UPSTREAM_REPO_TOKEN: ${{ secrets.UPSTREAM_REPO_TOKEN }}
        run: |
          git config --global \
            url."https://x-access-token:${UPSTREAM_REPO_TOKEN}@github.com/".insteadOf \
            "https://github.com/"
      # Sibling packages pinned to specific commit SHAs (see tests.yml
      # for rationale). Keep these SHAs in sync with tests.yml.
      - run: pip install "visioniceio @ git+https://github.com/VisionICeNatal/VisionICeIO.git@63bb74ac1fd473bbd2e9750eb8d4f70964af7538"
      - run: pip install "neural-cca @ git+https://github.com/goecidbn/neural_cca.git@86fe9426ec06d8974262a6200176217125a3d57a"
      - run: pip install -e ".[docs]"
      - run: sphinx-build -b html docs docs/_build/html
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs/_build/html
      - id: deployment
        uses: actions/deploy-pages@v4
