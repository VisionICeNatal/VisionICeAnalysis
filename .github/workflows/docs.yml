name: Deploy Docs

on:
  push:
    branches: [main]
  # Manual re-trigger that starts a *fresh* run (attempt 1). Use this
  # instead of "re-run jobs": re-running re-uploads the Pages artifact,
  # which makes deploy-pages fail with "multiple artifacts named
  # github-pages".
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Cancel any superseded run of the same workflow + ref so a fast
# follow-up commit doesn't queue up behind the now-stale previous run.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Build the Sphinx site and stage it as the single Pages artifact.
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: 'pip'
          cache-dependency-path: pyproject.toml
      # Sibling packages pinned to specific commit SHAs (see tests.yml
      # for rationale; both upstreams are public so these clone
      # anonymously). Keep these SHAs in sync with tests.yml.
      - run: pip install "visioniceio @ git+https://github.com/VisionICeNatal/VisionICeIO.git@63bb74ac1fd473bbd2e9750eb8d4f70964af7538"
      - run: pip install "neural-cca @ git+https://github.com/goecidbn/neural_cca.git@1b542c930799a384655bef79e45eb5a7da58538c"
      - run: pip install -e ".[docs]"
      - run: sphinx-build -b html docs docs/_build/html
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs/_build/html

  # Publish to GitHub Pages. Kept separate from build so that re-running
  # only this job reuses build's single artifact instead of uploading a
  # duplicate (the cause of the earlier "multiple artifacts" failure).
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
