name: Tests

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      # Install sibling packages from git until they're published to PyPI.
      # Once visioniceio and neural-cca are on PyPI, drop these two lines
      # and the `pip install -e ".[test]"` below will pull them automatically.
      - run: pip install "visioniceio @ git+https://github.com/VisionICeNatal/VisionICeIO.git@main"
      - run: pip install "neural-cca @ git+https://github.com/goecidbn/neural_cca.git@main"
      - run: pip install -e ".[test]"
      - run: pytest --cov=vision_ice_analysis --cov-report=term-missing
