name: Tests

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      # VisionICeIO is a private repo; anonymous git+https:// clones fail
      # with "could not read Username". Authenticate via the repo secret
      # UPSTREAM_REPO_TOKEN (fine-grained PAT with read access to
      # VisionICeNatal/VisionICeIO). See docs/developer.rst → "Continuous
      # Integration" for the one-time setup.
      - name: Configure git for private upstream cloning
        env:
          UPSTREAM_REPO_TOKEN: ${{ secrets.UPSTREAM_REPO_TOKEN }}
        run: |
          git config --global \
            url."https://x-access-token:${UPSTREAM_REPO_TOKEN}@github.com/".insteadOf \
            "https://github.com/"
      # Sibling packages pinned to specific commit SHAs (not @main) so
      # upstream churn on unrelated PRs cannot flap CI. Bumping a pin
      # is a deliberate act tied to re-verifying CROSS_CHECKS.md against
      # the new upstream — see docs/developer.rst → "Upstream
      # version-pin policy". Once both are on PyPI, drop these two
      # lines (and the git-config step above) — `pip install -e ".[test]"`
      # will then pull them automatically.
      - run: pip install "visioniceio @ git+https://github.com/VisionICeNatal/VisionICeIO.git@63bb74ac1fd473bbd2e9750eb8d4f70964af7538"
      - run: pip install "neural-cca @ git+https://github.com/goecidbn/neural_cca.git@86fe9426ec06d8974262a6200176217125a3d57a"
      - run: pip install -e ".[test]"
      - run: pytest --cov=vision_ice_analysis --cov-report=term-missing
