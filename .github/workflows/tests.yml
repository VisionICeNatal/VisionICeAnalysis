name: Tests

on: [push, pull_request]

# Cancel any superseded run of the same workflow + ref (push or PR
# update) so a fast follow-up commit doesn't queue up behind the now-
# stale previous run. Saves Actions minutes on push-heavy days.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
          cache-dependency-path: pyproject.toml
      # Sibling packages pinned to specific commit SHAs (not @main) so
      # upstream churn on unrelated PRs cannot flap CI. Both upstreams
      # are public, so these clone anonymously over git+https. Bumping a
      # pin is a deliberate act tied to re-verifying CROSS_CHECKS.md
      # against the new upstream — see docs/developer.rst → "Upstream
      # version-pin policy". The pins drop out once both are on PyPI and
      # `pip install -e ".[test]"` can resolve them directly.
      - run: pip install "visioniceio @ git+https://github.com/VisionICeNatal/VisionICeIO.git@63bb74ac1fd473bbd2e9750eb8d4f70964af7538"
      - run: pip install "neural-cca @ git+https://github.com/goecidbn/neural_cca.git@1b542c930799a384655bef79e45eb5a7da58538c"
      - run: pip install -e ".[test]"
      - run: pytest --cov=vision_ice_analysis --cov-report=term-missing
