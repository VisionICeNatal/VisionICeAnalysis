name: Lint

on: [push, pull_request]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      # Pin ruff so a new release doesn't flap CI on unrelated PRs.
      # Bump deliberately and re-run lint locally before merging the bump.
      - run: pip install ruff==0.15.14
      - run: ruff check .
      - run: ruff format --check .
